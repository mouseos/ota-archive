name: OTA pipeline

on:
  schedule:
    - cron: "17 */6 * * *"   # every 6 hours
  workflow_dispatch:
    inputs:
      otachecker_brands:
        description: 'otachecker brands to import (comma list, or "all"). Blank = major-brands default.'
        required: false
        default: ""
      otachecker_limit:
        description: "Max NEW OTAs to discover/analyse this run"
        required: false
        default: "150"
      upload_batch:
        description: "Max firmware to mirror to archive.org this run"
        required: false
        default: "80"

permissions:
  contents: write

concurrency:
  group: ota-pipeline
  cancel-in-progress: false

jobs:
  resolve:
    runs-on: ubuntu-latest
    outputs:
      pending: ${{ steps.pending.outputs.list }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r scripts/requirements.txt
      - name: Import discovered Google OTAs from otachecker
        env:
          OTACHECKER_BRANDS: ${{ github.event.inputs.otachecker_brands || vars.OTACHECKER_BRANDS }}
          OTACHECKER_LIMIT: ${{ github.event.inputs.otachecker_limit || vars.OTACHECKER_LIMIT || '150' }}
        run: python scripts/import_otachecker.py
      - name: Resolve firmware chains and regenerate index
        run: |
          python scripts/process_submissions.py
          python scripts/resolve.py OTA/Google
          python scripts/regen_index.py
      - name: Commit metadata
        run: |
          git config user.name "ota-bot"
          git config user.email "ota-bot@users.noreply.github.com"
          git add -A
          git commit -m "Resolve firmware + regen timestamps [skip ci]" || echo "no changes"
          git pull --rebase --autostash || true
          git push || true
      - name: Purge jsDelivr for changed json
        run: |
          git diff --name-only HEAD~1 HEAD 2>/dev/null | grep -E 'index\.json|/firmware/|catalog\.json|search\.json' | while read -r f; do
            curl -s "https://purge.jsdelivr.net/gh/${{ github.repository }}@${{ github.ref_name }}/$f" > /dev/null || true
          done
      - name: Collect pending uploads
        id: pending
        env:
          UPLOAD_BATCH: ${{ github.event.inputs.upload_batch || vars.UPLOAD_BATCH || '80' }}
        run: echo "list=$(python scripts/list_pending.py)" >> "$GITHUB_OUTPUT"

  upload:
    needs: resolve
    if: ${{ needs.resolve.outputs.pending != '[]' && needs.resolve.outputs.pending != '' }}
    runs-on: ubuntu-latest
    strategy:
      max-parallel: 2          # politeness + avoid push storms
      fail-fast: false
      matrix:
        path: ${{ fromJson(needs.resolve.outputs.pending) }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main          # firmware.json was just committed by the resolve job
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: |
          sudo apt-get update && sudo apt-get install -y aria2
          pip install requests
      - name: Download + upload to archive.org
        env:
          IA_ACCESS_KEY: ${{ secrets.IA_ACCESS_KEY }}
          IA_SECRET_KEY: ${{ secrets.IA_SECRET_KEY }}
        run: python scripts/ia_upload.py "${{ matrix.path }}"
      - name: Commit archiveUrls (rebase-retry for concurrent jobs)
        run: |
          git config user.name "ota-bot"
          git config user.email "ota-bot@users.noreply.github.com"
          git add -A
          git commit -m "Archive ${{ matrix.path }} [skip ci]" || { echo "no changes"; exit 0; }
          for i in 1 2 3 4 5; do
            if git pull --rebase --autostash && git push; then
              # purge so the app sees the new archiveUrls without jsDelivr cache lag
              curl -s "https://purge.jsdelivr.net/gh/${{ github.repository }}@${{ github.ref_name }}/${{ matrix.path }}" > /dev/null || true
              exit 0
            fi
            sleep $((RANDOM % 10 + 3))
          done
          echo "push failed after retries" >&2; exit 1

  finalize:
    needs: [resolve, upload]
    if: ${{ always() && needs.resolve.outputs.pending != '[]' && needs.resolve.outputs.pending != '' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main          # pick up archiveUrls written by the upload matrix
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Regenerate index with archiveUrls
        run: python scripts/regen_index.py
      - name: Commit + purge index
        run: |
          git config user.name "ota-bot"
          git config user.email "ota-bot@users.noreply.github.com"
          git add -A
          git commit -m "Regen index after archive [skip ci]" || { echo "no changes"; exit 0; }
          for i in 1 2 3 4 5; do
            if git pull --rebase --autostash && git push; then
              git diff --name-only HEAD~1 HEAD 2>/dev/null | grep -E 'index\.json|catalog\.json|search\.json' | while read -r f; do
                curl -s "https://purge.jsdelivr.net/gh/${{ github.repository }}@${{ github.ref_name }}/$f" > /dev/null || true
              done
              exit 0
            fi
            sleep $((RANDOM % 8 + 3))
          done
          echo "push failed after retries" >&2; exit 1
